# Netlify configuration for Suzuki Association of Pittsburgh
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Where serverless functions live
  functions = "netlify/functions"

# Increase function timeout to maximum allowed (26 seconds)
# Default is 10s which is too short for Claude API calls
[functions."admin-ai"]
  timeout = 26

# Redirect /admin to admin.html (cleaner URL)
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Security headers
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
