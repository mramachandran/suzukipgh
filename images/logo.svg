<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Suzuki Association of Pittsburgh">
  <defs>
    <linearGradient id="bgGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#1d4d66"/>
      <stop offset="50%" stop-color="#2C5F7C"/>
      <stop offset="100%" stop-color="#8B4789"/>
    </linearGradient>
    <radialGradient id="highlightGrad" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer shadow -->
  <circle cx="101" cy="103" r="92" fill="rgba(0,0,0,0.22)"/>

  <!-- Main background circle -->
  <circle cx="100" cy="100" r="91" fill="url(#bgGrad)"/>

  <!-- Radial highlight for depth -->
  <circle cx="100" cy="100" r="91" fill="url(#highlightGrad)"/>

  <!-- Gold ring (outer) -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#D4A574" stroke-width="3"/>
  <!-- Gold ring (inner, subtle) -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.35"/>

  <!-- ── BEAMED EIGHTH NOTES ── -->
  <!-- All note elements in solid gold for clarity at small sizes -->

  <!-- Left note head (filled ellipse, slightly tilted) -->
  <ellipse cx="72" cy="130" rx="15" ry="11" fill="#D4A574" transform="rotate(-18 72 130)"/>

  <!-- Right note head -->
  <ellipse cx="124" cy="117" rx="15" ry="11" fill="#D4A574" transform="rotate(-18 124 117)"/>

  <!-- Left stem (right edge of left note head going straight up) -->
  <rect x="82" y="65" width="5" height="62" rx="2.5" fill="#D4A574"/>

  <!-- Right stem -->
  <rect x="134" y="53" width="5" height="62" rx="2.5" fill="#D4A574"/>

  <!-- Beam 1 (top, bold — connecting tops of both stems) -->
  <polygon points="80,65 141,53 141,68 80,80" fill="#D4A574"/>

  <!-- Beam 2 (second beam below, for double eighth note style) -->
  <polygon points="80,83 141,71 141,84 80,96" fill="#D4A574" opacity="0.80"/>

  <!-- ── LETTERING ── -->
  <text x="100" y="162"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="bold" letter-spacing="3.5"
        fill="#D4A574" text-anchor="middle">SUZUKI</text>
  <text x="100" y="177"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="9.5" letter-spacing="2"
        fill="#D4A574" text-anchor="middle" opacity="0.80">PITTSBURGH</text>
</svg>
